jobs:
  build:
    runs-on: ${{ matrix.system.image }}
    steps:
      - uses: 'actions/checkout@v6'
      - name: 'Install yq'
        run: 'pipx install yq'
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@v7'
      - name: 'Set up Python'
        uses: 'actions/setup-python@v6'
        with:
          python-version: '3.13'
      - name: 'Install dependencies'
        run: 'sudo apt-get update && sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev'
      - name: 'Install dependencies (uv)'
        run: |
          uv sync --all-extras --all-groups
          uv pip install python-appimage
          wget -O generic.svg 'https://raw.githubusercontent.com/KDE/breeze-icons/refs/heads/master/icons/preferences/32/preferences-other.svg'
        shell: 'bash'
      - name: 'Build with python-appimage'
        run: |
          project_name=$(tomlq -r '.project.urls.repository|split("/")[-1]' pyproject.toml)
          version=$(tomlq -r .project.version pyproject.toml)
          rm -fR dist recipe
          mkdir dist recipe
          cat > recipe/entrypoint.sh <<EOF
          {{ python-executable }} \${APPDIR}/opt/python{{ python-version }}/bin/deltona "\$@"
          EOF
          chmod +x recipe/entrypoint.sh
          cat > recipe/deltona.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=deltona
          Icon=deltona
          Categories=Utility;
          Terminal=true
          X-AppImage-Version=${version}
          EOF
          cat > recipe/requirements.txt <<EOF
          $(pwd -P)
          EOF
          uv export --no-hashes --all-extras --no-annotate | awk '{ print $1 }' | grep -E 'beautifulsoup4|gitpython|html5lib|mutagen|paramiko|pexpect|pillow|platformdirs|psutil|pydbus|pygithub|pygobject|pyperclip|python-xz|pyyaml|unidecode|yt-dlp' >> recipe/requirements.txt
          cat > recipe/deltona.appinfo.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>deltona</id>
            <metadata_license>GFDL-1.3</metadata_license>
            <project_license>MIT</project_license>
            <name>deltona</name>
            <summary>A lot of uncategorised utilities.</summary>
            <description>
              <p>${project_name} - ${{ github.server_url }}/${{ github.repository }}</p>
            </description>
            <launchable type="desktop-id">deltona.desktop</launchable>
            <url type="homepage">${{ github.server_url }}/${{ github.repository }}</url>
            <screenshots>
              <screenshot type="default">
                <image></image>
              </screenshot>
            </screenshots>
            <provides>
              <id>deltona.desktop</id>
            </provides>
          </component>
          EOF
          cp generic.svg recipe/deltona.svg
          echo "Building AppImage for 'deltona'..."
          uv run python -m python_appimage -v build app -l "manylinux2014_${{ matrix.system.arch }}" -p 3.13 recipe
          mv "deltona-${{ matrix.system.arch }}.AppImage" "dist/deltona-${{ matrix.system.arch }}.AppImage"
        shell: 'bash'
      - name: 'Test binary'
        run: |
          ./dist/deltona-${{ matrix.system.arch }}.AppImage --help
          ./dist/deltona-${{ matrix.system.arch }}.AppImage add-cdda-times --help
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@v7'
        with:
          if-no-files-found: error
          name: deltona-binaries-linux-${{ matrix.system.arch }}
          path: |
            dist/*
      - name: 'Zip files'
        run: |
          rm -fR _out
          mkdir _out
          zip -j _out/deltona-${{ github.ref_name }}.zip dist/*
      - name: 'Attest'
        uses: 'actions/attest-build-provenance@v4'
        with:
          subject-path: '_out/*.zip'
      - if: github.ref_type == 'tag'
        name: Upload package
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            _out/*.zip
    strategy:
      matrix:
        system:
          - { arch: aarch64, image: ubuntu-24.04-arm }
          - { arch: x86_64, image: ubuntu-latest }
name: 'AppImage'
'on':
  push:
    branches:
      - 'master'
    tags:
      - 'v*.*.*'
permissions:
  attestations: 'write'
  contents: 'write'
  id-token: 'write'
