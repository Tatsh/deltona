jobs:
  build:
    runs-on: ${{ matrix.os }}
    steps:
      - uses: 'actions/checkout@v6'
      - name: 'Install yq'
        run: 'pipx install yq'
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@v7'
      - name: 'Set up Python'
        uses: 'actions/setup-python@v6'
        with:
          python-version: '3.13'
      - if: matrix.os == 'windows-11-arm'
        name: 'Cache vcpkg installed packages'
        uses: 'actions/cache@v4'
        with:
          key: vcpkg-arm64-windows-openssl-${{ hashFiles('.github/workflows/pyinstaller.yml') }}
          path: '~/vcpkg/installed'
      - if: matrix.os == 'windows-11-arm'
        name: 'Set up vcpkg'
        run: |
          $cachedInstalled = $null
          if (Test-Path "$env:USERPROFILE\vcpkg\installed") {
            $cachedInstalled = "$env:TEMP\vcpkg-installed"
            Move-Item "$env:USERPROFILE\vcpkg\installed" $cachedInstalled
            Remove-Item -Recurse -Force "$env:USERPROFILE\vcpkg"
          }
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          if ($cachedInstalled) {
            Move-Item $cachedInstalled "$env:USERPROFILE\vcpkg\installed"
          }
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:USERPROFILE\vcpkg\vcpkg.exe" install openssl --triplet arm64-windows

          $installed = "$env:USERPROFILE\vcpkg\installed\arm64-windows"

          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\vcpkg"
          Add-Content -Path $env:GITHUB_PATH -Value "$installed\tools\pkgconf"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:USERPROFILE\vcpkg"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=arm64-windows"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_DIR=$installed"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$installed\lib\pkgconfig"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_PREFIX_PATH=$installed"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$installed\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$installed\include"
        shell: 'pwsh'
      - name: 'Install dependencies (uv)'
        run: |
          uv sync --all-extras --all-groups
          uv pip install pyinstaller
        shell: 'bash'
      - name: 'Build with PyInstaller'
        run: |
          project_name=$(tomlq -r '.project.urls.repository|split("/")[-1]' pyproject.toml)
          vers="$(tomlq -r '.project.version|split(".")|map(tonumber)|@csv' pyproject.toml),0"
          version=$(tomlq -r .project.version pyproject.toml)
          cat > temp_script.py <<EOF
          from deltona.commands.main import main
          if __name__ == '__main__':
              main()
          EOF
          if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
              cat temp_script.py
          fi
          cat > version-info.txt <<EOF
          VSVersionInfo(
              ffi=FixedFileInfo(date=(0, 0),
                                filevers=(${vers}),
                                fileType=0x1,
                                flags=0x0,
                                mask=0x3f,
                                OS=0x4,
                                prodvers=(${vers}),
                                subtype=0x0),
              kids=[
                  StringFileInfo([
                      StringTable('040904B0', [
                          StringStruct('CompanyName', 'Tatsh'),
                          StringStruct(
                              'FileDescription',
                              '${project_name} - ${{ github.server_url }}/${{ github.repository }}'
                          ),
                          StringStruct('FileVersion', '${version}'),
                          StringStruct('InternalName', 'deltona.exe'),
                          StringStruct('LegalCopyright', 'Copyright (c) ${project_name} authors.'),
                          StringStruct('OriginalFilename', 'deltona.exe'),
                          StringStruct('ProductName', '${project_name}'),
                          StringStruct('ProductVersion', '${version}')
                      ])
                  ]),
                  VarFileInfo([VarStruct('Translation', [0x409, 1200, 0x809, 1252])])
              ])
          EOF
          if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
              cat version-info.txt
          fi
          echo "Building executable for 'deltona'..."
          openssl_args=()
          if [[ -n "${OPENSSL_DIR:-}" ]]; then
              openssl_args=(--add-binary "${OPENSSL_DIR}/bin/*.dll;.")
          fi
          uv run pyinstaller --log-level ERROR --onefile -n deltona --optimize 1 \
            --hidden-import colorlog --collect-submodules deltona \
            --collect-data binaryornot \
            -y --version-file version-info.txt \
            "${openssl_args[@]}" temp_script.py
          if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
              cat deltona.spec
          fi
        shell: 'bash'
      - if: matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm'
        name: 'Test binary'
        run: |
          & dist\deltona.exe --help
          & dist\deltona.exe add-cdda-times --help
      - if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        name: 'Test binary'
        run: |
          ./dist/deltona --help
          ./dist/deltona add-cdda-times --help
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@v7'
        with:
          if-no-files-found: error
          name: deltona-binaries-${{ matrix.suffix }}
          path: |
            ${{ matrix.dist_path }}
      - name: 'Attest'
        uses: 'actions/attest-build-provenance@v4'
        with:
          subject-path: '${{ matrix.dist_path }}'
      - if: (matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel') && github.ref_type == 'tag'
        name: 'Zip files'
        run: |
          rm -fR _out
          mkdir _out
          zip -j _out/deltona-${{ github.ref_name }}-${{ matrix.suffix }}.zip ${{ matrix.dist_path }}
      - if: (matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm') && github.ref_type == 'tag'
        name: 'Zip files'
        run: |
          Remove-Item -Force _out -ErrorAction Continue
          New-Item -ItemType Directory -Name _out
          Compress-Archive -Path ${{ matrix.dist_path }} -DestinationPath _out/deltona-${{ github.ref_name }}-${{ matrix.suffix }}.zip
        shell: pwsh
      - if: github.ref_type == 'tag'
        name: 'Attest'
        uses: 'actions/attest-build-provenance@v4'
        with:
          subject-path: '_out/*.zip'
      - if: github.ref_type == 'tag'
        name: Upload package
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            _out/*.zip
    strategy:
      matrix:
        include:
          - os: 'macos-15-intel'
            dist_path: 'dist/*'
            suffix: 'mac-x86_64'
          - os: 'macos-latest'
            dist_path: 'dist/*'
            suffix: 'mac-arm64'
          - os: 'windows-latest'
            dist_path: 'dist/*.exe'
            suffix: 'win-x86_64'
          - os: 'windows-11-arm'
            dist_path: 'dist/*.exe'
            suffix: 'win-arm64'
name: 'PyInstaller'
'on':
  push:
    branches:
      - 'master'
    tags:
      - 'v*.*.*'
permissions:
  attestations: 'write'
  contents: 'write'
  id-token: 'write'
