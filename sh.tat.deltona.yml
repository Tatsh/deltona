app-id: 'sh.tat.deltona'
command: 'deltona'
finish-args:
  - '--share=ipc'
  - '--share=network'
  - '--socket=fallback-x11'
  - '--socket=wayland'
modules:
  - build-commands:
      - 'pip3 install --prefix=/app uv'
      - '/app/bin/uv pip install --prefix=/app .'
    build-options:
      build-args:
        - '--share=network'
    buildsystem: 'simple'
    name: 'deltona'
    sources:
      - tag: 'v0.2.3'
        type: 'git'
        url: 'https://github.com/Tatsh/deltona.git'
runtime: 'org.freedesktop.Platform'
runtime-version: '24.08'
sdk: 'org.freedesktop.Sdk'
