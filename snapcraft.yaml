apps:
  deltona:
    command: 'bin/deltona'
    plugs:
      - 'home'
      - 'network'
      - 'network-bind'
base: 'core24'
confinement: 'strict'
contact: 'https://github.com/Tatsh/deltona/issues'
description: 'A lot of uncategorised utilities.'
donation: 'https://buymeacoffee.com/Tatsh'
grade: 'stable'
issues: 'https://github.com/Tatsh/deltona/issues'
license: 'MIT'
name: 'deltona'
parts:
  deltona:
    build-packages:
      - 'libcairo2-dev'
      - 'libgirepository-2.0-dev'
      - 'pkg-config'
    plugin: 'python'
    python-packages:
      - '.'
    source: '.'
    stage-packages: []
platforms:
  amd64:
    build-on: 'amd64'
  arm64:
    build-on: 'arm64'
source-code: 'https://github.com/Tatsh/deltona'
summary: 'A lot of uncategorised utilities.'
title: 'deltona'
version: '0.1.4'
website: 'https://tatsh.github.io/deltona/'
